[pytest]
addopts = -v --tb=short
testpaths = tests
python_files = test_*.py

# 1. Automatically create and stream all logs to a folder/file
log_file = logs/api_logs.log
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# 2. Keep displaying live log outputs directly inside your terminal screen
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s